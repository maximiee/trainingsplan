version: '3.8'
services:
  trainingsplan:
    build: .
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    environment:
      - SESSION_SECRET=${SESSION_SECRET}
      - DB_PATH=/app/data/trainingsplan.db
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@verein.de}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme123}
      - CLUB_NAME=${CLUB_NAME:-Fussballverein}
    restart: unless-stopped
