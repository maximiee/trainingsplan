version: '3.8'
services:
  trainingsplan:
    build: .
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    environment:
      - SESSION_SECRET=${SESSION_SECRET}
      - DB_PATH=/app/data/trainingsplan.db
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@verein.de}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme123}
      - CLUB_NAME=${CLUB_NAME:-Fussballverein}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    restart: unless-stopped
